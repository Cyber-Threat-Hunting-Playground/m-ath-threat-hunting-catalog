name: Track Other Data Sources

on:
  issues:
    types: [opened, edited, labeled]

permissions:
  issues: write

jobs:
  check-other-data:
    if: contains(github.event.issue.labels.*.name, 'proposed-scenario')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check other data sources and create issue if needed
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python .github/scripts/check_other_data_sources.py
